name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        emacs-version:
          - 30.2
        experimental: [false]
        # include:
        # - os: ubuntu-latest
        #   emacs-version: snapshot
        #   experimental: true
        # - os: macos-latest
        #   emacs-version: snapshot
        #   experimental: true
        # - os: windows-latest
        #   emacs-version: snapshot
        #   experimental: true

    steps:
    - uses: actions/checkout@v4

    - uses: jcs090218/setup-emacs@master
      with:
        version: ${{ matrix.emacs-version }}

    - uses: emacs-eask/setup-eask@master
      with:
        version: 'snapshot'

    - name: Install ripgrep (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get -y install ripgrep

    - name: Install ripgrep (macOS)
      if: runner.os == 'macOS'
      run: brew install ripgrep

    - name: Install ripgrep (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: choco install ripgrep -y

    - name: Verify ripgrep
      run: rg --version

    - name: Clean Eask state
      run: eask clean all

    # HACK: Work around package.el skipping bundled package upgrades during
    # dependency installation; gptel needs a newer transient than Emacs 30.2
    # ships.
    - name: Install transient
      run: eask install transient --force

    - name: Install dependencies
      run: eask install-deps --dev

    - name: Run tests
      run: eask test ert test/test-*.el

    - name: Compile
      run: eask compile

    - name: Build package
      run: eask package

    - name: Install package
      run: eask install
