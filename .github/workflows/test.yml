name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        emacs-version:
          - 30.2
        experimental: [false]
        # include:
        # - os: ubuntu-latest
        #   emacs-version: snapshot
        #   experimental: true
        # - os: macos-latest
        #   emacs-version: snapshot
        #   experimental: true
        # - os: windows-latest
        #   emacs-version: snapshot
        #   experimental: true

    steps:
    - uses: actions/checkout@v4

    - uses: jcs090218/setup-emacs@master
      with:
        version: ${{ matrix.emacs-version }}

    - uses: emacs-eask/setup-eask@master
      with:
        version: 'snapshot'

    - name: Run tests
      run: |
        eask clean all
        # HACK: Work around package.el skipping bundled package upgrades during
        # dependency installation; gptel needs a newer transient than Emacs 30.2
        # ships.
        eask install transient --force
        eask install-deps --dev
        eask test ert test/test-*.el
        eask compile
        eask package
        eask install
